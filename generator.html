<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор Скорборда PRO — Стаявидение</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold: #FFD700; --silver: #C0C0C0; --bronze: #CD7F32;
            --bg-dark: #0a0a1a; --accent1: #7B2FBE; --accent2: #E91E8C; --accent3: #00D4FF;
            --text-primary: #ffffff; --text-secondary: #b0b0cc;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-dark); color: var(--text-primary);
            min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden;
        }

        header { text-align: center; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); background: rgba(10,10,26,0.9); z-index: 10; }
        h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 900; background: linear-gradient(135deg, var(--gold), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }

        .app-container { display: flex; flex-wrap: wrap; gap: 20px; max-width: 1600px; margin: 0 auto; padding: 20px; flex: 1; width: 100%; }

        /* --- ЛЕВАЯ ПАНЕЛЬ (НАСТРОЙКИ) --- */
        .controls-panel { flex: 1; min-width: 350px; max-width: 500px; background: rgba(18, 18, 42, 0.7); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; height: max-content; }
        
        .section-title { font-size: 1rem; color: var(--accent3); margin: 20px 0 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .section-title:first-child { margin-top: 0; }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        @media (max-width: 600px) { .settings-grid { grid-template-columns: 1fr; } }
        
        .control-group { display: flex; flex-direction: column; justify-content: flex-end; }
        .control-group label { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 5px; text-transform: uppercase; font-weight: 600; }
        .control-group input[type="text"], .control-group select, .control-group input[type="file"], .control-group input[type="number"] {
            width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; font-family: 'Montserrat', sans-serif;
        }
        
        .control-row { display: flex; gap: 10px; align-items: center; }
        .control-row input[type="color"] { flex-shrink: 0; padding: 0; width: 40px; height: 35px; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; cursor: pointer; background: transparent; }
        .control-row input[type="range"] { flex: 1; accent-color: var(--accent3); }

        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-top: 5px; cursor: pointer; font-size: 0.85rem; font-weight: 600; color: white; }
        .checkbox-group input { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent2); }

        .btn-action { background: rgba(255,255,255,0.1); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: 600; width: 100%; }
        .btn-action:hover { background: rgba(255,255,255,0.2); }
        .btn-random { background: linear-gradient(135deg, var(--accent1), var(--accent3)); margin-top: 15px; }

        .participants-editor { display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto; padding-right: 5px; margin: 15px 0; }
        .participants-editor::-webkit-scrollbar { width: 5px; }
        .participants-editor::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 5px; }
        
        .editor-row { display: flex; gap: 6px; align-items: center; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .editor-row select { flex: 1; min-width: 90px; padding: 6px; border-radius: 6px; background: rgba(255,255,255,0.1); color: white; border: none; font-size: 0.8rem; }
        .editor-row input { flex: 1.5; min-width: 70px; padding: 6px; border-radius: 6px; background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem; }
        .editor-row input[type="number"] { flex: 0.5; min-width: 50px; }
        
        .btn-icon { background: rgba(255,255,255,0.1); border:none; color: white; border-radius: 4px; cursor:pointer; width:20px; height:16px; font-size:9px; display:flex; align-items:center; justify-content:center; }
        .btn-icon:hover { background: var(--accent3); }
        .btn-remove { background: #ff4d4d; color: white; border: none; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-weight: bold; flex-shrink: 0; }

        /* --- ПРАВАЯ ПАНЕЛЬ (ПРЕВЬЮ) --- */
        .preview-panel { flex: 2; display: flex; flex-direction: column; align-items: center; min-width: 300px; }

        /* КОНТЕЙНЕР ДЛЯ РЕНДЕРА (Скриншот делается отсюда) */
        #scoreboard-capture {
            width: 100%; position: relative; background: #0a0a1a;
            border-radius: 12px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* Слои фона: для эффекта размытия */
        .bg-layer { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
        .bg-layer-blur { background-size: cover; background-position: center; filter: blur(30px) brightness(0.6); transform: scale(1.1); }
        .bg-layer-clear { background-size: contain; background-repeat: no-repeat; background-position: center; opacity: 0.8; }
        .bg-overlay { position: absolute; inset: 0; background: rgba(0,0,0, var(--bg-darken, 0.3)); z-index: 0; }

        .capture-inner {
            position: relative; z-index: 1; width: 100%; height: 100%;
            padding: var(--pad-y, 40px) var(--pad-x, 40px);
            display: flex; flex-direction: column;
        }

        .board-header { text-align: center; margin-bottom: 25px; }
        .board-title { font-family: 'Playfair Display', serif; font-size: clamp(1.5rem, 4vw, 3rem); font-weight: 900; color: white; line-height: 1.2; text-transform: uppercase; }
        .board-subtitle { color: var(--gold); font-size: clamp(0.8rem, 2vw, 1.2rem); text-transform: uppercase; letter-spacing: 4px; font-weight: 700; margin-top: 5px; }

        .board-results { display: grid; gap: 12px; align-content: start; flex: 1; }

        /* ОБЩИЕ СТИЛИ СТРОК */
        .result-row { display: flex; align-items: center; transition: all 0.3s ease; }
        .position { display: flex; align-items: center; justify-content: center; font-weight: 900; flex-shrink: 0; }
        .participant-avatar { object-fit: cover; flex-shrink: 0; background: #2a2a4a; border-radius: var(--avatar-radius, 50%); }
        .participant-info { flex: 1; display: flex; flex-direction: column; justify-content: center; overflow: hidden; white-space: nowrap; margin-right: 10px; }
        .participant-name { font-weight: 700; text-overflow: ellipsis; overflow: hidden; }
        .participant-note { color: var(--text-secondary); text-overflow: ellipsis; overflow: hidden; font-size: 0.85rem; }
        .score { text-align: right; flex-shrink: 0; }
        .score-number { font-weight: 900; line-height: 1; }

        /* === СТИЛЬ: СТАЯВИДЕНИЕ (Толстые плашки) === */
        .style-stayavision .result-row { padding: 12px 20px; border-radius: 12px; background: linear-gradient(90deg, var(--bar-color), transparent); border: 1px solid rgba(255,255,255,0.05); }
        
        .style-stayavision .result-row.place-1 { background: linear-gradient(90deg, var(--c-p1-bg), transparent); border-color: var(--c-p1); }
        .style-stayavision .result-row.place-2 { background: linear-gradient(90deg, var(--c-p2-bg), transparent); border-color: rgba(255,255,255,0.1); }
        .style-stayavision .result-row.place-3 { background: linear-gradient(90deg, var(--c-p3-bg), transparent); border-color: rgba(255,255,255,0.1); }
        
        .style-stayavision .position { width: 45px; height: 45px; border-radius: 50%; font-size: 1.2rem; margin-right: 15px; background: rgba(255,255,255,0.1); color: white; }
        .style-stayavision .place-1 .position { background: var(--c-p1); color: #000; box-shadow: 0 0 15px var(--c-p1-bg); }
        .style-stayavision .place-2 .position { background: var(--c-p2); color: #000; }
        .style-stayavision .place-3 .position { background: var(--c-p3); color: #fff; }
        
        .style-stayavision .participant-avatar { width: 50px; height: 50px; margin-right: 15px; border: 2px solid rgba(255,255,255,0.1); }
        .style-stayavision .place-1 .participant-avatar { border-color: var(--c-p1); }
        
        .style-stayavision .participant-name { font-size: 1.3rem; color: #fff; }
        .style-stayavision .place-1 .participant-name { color: var(--c-p1); }
        .style-stayavision .score-number { font-size: 1.8rem; color: #fff; }
        .style-stayavision .place-1 .score-number { color: var(--c-p1); }
        
        .style-stayavision .score-label { font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; }
        .style-stayavision .score-bar { width: 90px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 5px; margin-left: auto; }
        .style-stayavision .score-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent1), var(--accent2)); }
        .style-stayavision .place-1 .score-bar-fill { background: var(--c-p1); }

        /* === СТИЛЬ: ЕВРОВИДЕНИЕ (Тонкие неоновые плашки) === */
        .style-eurovision .result-row { padding: 6px 12px; background: linear-gradient(90deg, var(--bar-color), rgba(0,0,0,0.4)); border-radius: 4px; border: 1px solid rgba(255,255,255,0.05); border-left: 4px solid var(--accent3); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        .style-eurovision .result-row.place-1 { border-left-color: var(--c-p1); background: linear-gradient(90deg, var(--c-p1-bg), rgba(40,40,90,0.6)); }
        .style-eurovision .result-row.place-2 { border-left-color: var(--c-p2); background: linear-gradient(90deg, var(--c-p2-bg), rgba(40,40,90,0.6)); }
        .style-eurovision .result-row.place-3 { border-left-color: var(--c-p3); background: linear-gradient(90deg, var(--c-p3-bg), rgba(40,40,90,0.6)); }
        
        .style-eurovision .position { width: 35px; height: 35px; font-size: 1.1rem; margin-right: 12px; border-right: 1px solid rgba(255,255,255,0.2); padding-right: 10px; justify-content: flex-start; color: #fff; }
        .style-eurovision .place-1 .position { color: var(--c-p1); border-right-color: var(--c-p1); }
        
        .style-eurovision .participant-avatar { width: 35px; height: 35px; margin-right: 12px; }
        .style-eurovision .participant-name { font-size: 1.1rem; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        .style-eurovision .score-number { font-size: 1.5rem; color: var(--accent3); }
        .style-eurovision .place-1 .score-number { color: var(--c-p1); }
        .style-eurovision .score-label, .style-eurovision .score-bar { display: none; }

        /* Кнопка скачивания */
        .btn-download {
            margin-top: 25px; background: linear-gradient(135deg, #00D4FF, #7B2FBE); color: white; border: none; padding: 15px 40px; border-radius: 30px;
            font-size: 1.1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; box-shadow: 0 10px 30px rgba(123, 47, 190, 0.4);
            transition: all 0.3s; display: flex; align-items: center; gap: 10px;
        }
        .btn-download:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(123, 47, 190, 0.6); }
    </style>
</head>
<body>
    <header><h1>Генератор Скорборда PRO</h1></header>

    <div class="app-container">
        <!-- ПАНЕЛЬ НАСТРОЕК -->
        <div class="controls-panel">
            
            <div class="section-title">Текст и Формат</div>
            <div class="settings-grid">
                <div class="control-group"><label>Заголовок</label><input type="text" id="inTitle" value="Стаявидение 6" oninput="updateState('title', this.value)"></div>
                <div class="control-group"><label>Подзаголовок</label><input type="text" id="inSubtitle" value="Итоговые результаты" oninput="updateState('subtitle', this.value)"></div>
                
                <div class="control-group">
                    <label>Разрешение экрана</label>
                    <select id="inRatio" onchange="updateState('aspectRatio', this.value)">
                        <option value="16/9">16:9 (Стандарт)</option>
                        <option value="21/9">21:9 (Широкий)</option>
                        <option value="4/3">4:3 (ТВ)</option>
                        <option value="1/1">1:1 (Квадрат)</option>
                        <option value="custom">Свой размер...</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Колонки (1-6)</label>
                    <select id="inCols" onchange="updateState('columns', this.value)">
                        <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                        <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                    </select>
                </div>
            </div>

            <!-- Скрытый блок кастомного разрешения -->
            <div id="customResBlock" style="display: none; margin-top: 10px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px;">
                <div style="display:flex; gap:10px;">
                    <div class="control-group" style="flex:1;"><label>Ширина (px)</label><input type="number" id="inW" value="1920" oninput="updateState('customW', this.value)"></div>
                    <div class="control-group" style="flex:1;"><label>Высота (px)</label><input type="number" id="inH" value="1080" oninput="updateState('customH', this.value)"></div>
                </div>
            </div>

            <div class="section-title">Дизайн и Цвета</div>
            <div class="settings-grid">
                <div class="control-group">
                    <label>Стиль дизайна</label>
                    <select id="inStyle" onchange="updateState('style', this.value)">
                        <option value="stayavision">Стаявидение (Толстые)</option>
                        <option value="eurovision">Eurovision (Тонкие)</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Форма аватарок</label>
                    <select id="inAvatar" onchange="updateState('avatarShape', this.value)">
                        <option value="50%">Круг</option>
                        <option value="8px">Закругленный квадрат</option>
                        <option value="0px">Квадрат</option>
                    </select>
                </div>
            </div>

            <div class="control-group" style="margin-top:10px;">
                <label>Цвет плашек (HEX + Прозрачность)</label>
                <div class="control-row">
                    <input type="color" id="inBarColor" value="#141432" oninput="updateState('barColor', this.value)">
                    <input type="range" id="inBarAlpha" min="0" max="1" step="0.05" value="0.8" oninput="updateState('barAlpha', this.value)">
                </div>
            </div>

            <label class="checkbox-group" style="margin-top: 15px;">
                <input type="checkbox" id="inTop3" checked onchange="updateState('highlightTop3', this.checked)"> Выделять 1, 2, 3 места цветом
            </label>

            <div id="top3Colors" style="display: flex; gap:10px; margin-top: 10px;">
                <div class="control-group" style="flex:1"><label>1 место</label><input type="color" id="inC1" value="#FFD700" oninput="updateState('c1', this.value)"></div>
                <div class="control-group" style="flex:1"><label>2 место</label><input type="color" id="inC2" value="#C0C0C0" oninput="updateState('c2', this.value)"></div>
                <div class="control-group" style="flex:1"><label>3 место</label><input type="color" id="inC3" value="#CD7F32" oninput="updateState('c3', this.value)"></div>
            </div>

            <div class="section-title">Макет и Фон</div>
            <div class="settings-grid">
                <div class="control-group">
                    <label>Отступ по бокам (X px)</label>
                    <input type="range" min="0" max="200" value="40" oninput="updateState('padX', this.value)">
                </div>
                <div class="control-group">
                    <label>Отступ сверху/снизу (Y px)</label>
                    <input type="range" min="0" max="200" value="40" oninput="updateState('padY', this.value)">
                </div>
            </div>

            <div class="control-group" style="margin-top:10px;">
                <label>Задний фон</label>
                <select id="inBgType" onchange="updateState('bgType', this.value)">
                    <option value="none">Тёмная заливка (По умолчанию)</option>
                    <option value="wolfs.jpg">Волки (wolfs.jpg)</option>
                    <option value="sv6.webp">Стаявидение 6 (sv6.webp)</option>
                    <option value="sv7.webp">Стаявидение 7 (sv7.webp)</option>
                    <option value="custom">Загрузить свой фон...</option>
                </select>
                <input type="file" id="inBgCustom" style="display:none; margin-top:5px;" accept="image/*" onchange="handleBgUpload(event)">
            </div>

            <div class="section-title">Участники</div>
            
            <div class="settings-grid" style="margin-bottom: 10px;">
                <div class="control-group">
                    <label>Режим экрана</label>
                    <select id="inMode" onchange="updateState('viewMode', this.value)">
                        <option value="results">Результаты (с баллами)</option>
                        <option value="running_order">Running Order (Жеребьевка)</option>
                    </select>
                </div>
                <div class="control-group" style="justify-content: center;">
                    <label class="checkbox-group"><input type="checkbox" checked onchange="updateState('showNotes', this.checked)"> Показывать заметки</label>
                </div>
            </div>

            <button class="btn-action btn-random" onclick="randomizeParticipants()">🎲 СЛУЧАЙНАЯ ЖЕРЕБЬЕВКА</button>

            <div class="participants-editor" id="editorContainer"></div>
            
            <button class="btn-action" style="border: 1px dashed var(--accent3); color: var(--accent3); background: transparent;" onclick="addParticipant()">+ ДОБАВИТЬ УЧАСТНИКА</button>
        </div>

        <!-- ПАНЕЛЬ ПРЕВЬЮ -->
        <div class="preview-panel">
            <div id="scoreboard-capture">
                <!-- Слои фона -->
                <div class="bg-layer bg-layer-blur" id="bgBlur"></div>
                <div class="bg-layer bg-layer-clear" id="bgClear"></div>
                <div class="bg-overlay"></div>

                <div class="capture-inner" id="captureInner">
                    <div class="board-header">
                        <div class="board-title" id="renderTitle"></div>
                        <div class="board-subtitle" id="renderSubtitle"></div>
                    </div>
                    <div class="board-results" id="renderBoard"></div>
                </div>
            </div>

            <button class="btn-download" onclick="downloadImage()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                Сохранить картинку
            </button>
        </div>
    </div>

    <script>
        let state = {
            title: "Стаявидение 6", subtitle: "Итоговые результаты", style: "stayavision", viewMode: "results",
            aspectRatio: "16/9", customW: 1920, customH: 1080, columns: 1, 
            bgType: "none", bgCustomData: "",
            padX: 40, padY: 40, showNotes: true, avatarShape: "50%",
            barColor: "#141432", barAlpha: 0.8,
            highlightTop3: true, c1: "#FFD700", c2: "#C0C0C0", c3: "#CD7F32",
            participants: [
                { id: 1, name: "Обалена", score: 16, note: "Песня Обалены", avatar: "obalena.jpg" },
                { id: 2, name: "Ритикс", score: 14, note: "Песня Ритикса", avatar: "ritix.jpg" },
                { id: 3, name: "Гира", score: 12, note: "Песня Гиры", avatar: "gira.jpg" },
                { id: 4, name: "Егорь", score: 8, note: "Песня Егоря", avatar: "egor.jpg" },
                { id: 5, name: "Енька", score: 4, note: "Песня Еньки", avatar: "enka.jpg" },
                { id: 6, name: "И. Потужность", score: 2, note: "Песня", avatar: "potuzhnost.jpg" }
            ]
        };

        const serverImages = [
            { file: "default.jpg", name: "Дефолт" }, { file: "gira.jpg", name: "Гира" },
            { file: "obalena.jpg", name: "Обалена" }, { file: "egor.jpg", name: "Егорь" },
            { file: "ritix.jpg", name: "Ритикс" }, { file: "enka.jpg", name: "Енька" },
            { file: "potuzhnost.jpg", name: "Потужн." }
        ];

        function hexToRgba(hex, alpha) {
            let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function init() { renderEditor(); updatePreview(); }

        function updateState(key, value) {
            state[key] = value;
            
            // Логика UI
            if(key === 'aspectRatio') document.getElementById('customResBlock').style.display = value === 'custom' ? 'block' : 'none';
            if(key === 'highlightTop3') document.getElementById('top3Colors').style.opacity = value ? '1' : '0.3';
            if(key === 'bgType') {
                const fileIn = document.getElementById('inBgCustom');
                if (value === 'custom') { fileIn.style.display = 'block'; fileIn.click(); } else { fileIn.style.display = 'none'; }
            }
            updatePreview();
        }

        function updateParticipant(id, field, value) {
            const p = state.participants.find(x => x.id === id);
            if(p) { p[field] = field === 'score' ? Number(value) : value; updatePreview(); }
        }

        function moveParticipant(id, dir) {
            const index = state.participants.findIndex(p => p.id === id);
            if (index < 0) return;
            const newIndex = index + dir;
            if (newIndex < 0 || newIndex >= state.participants.length) return;
            [state.participants[index], state.participants[newIndex]] = [state.participants[newIndex], state.participants[index]];
            renderEditor(); updatePreview();
        }

        function renderEditor() {
            const container = document.getElementById('editorContainer');
            container.innerHTML = '';
            state.participants.forEach((p) => {
                let optionsHtml = serverImages.map(img => `<option value="${img.file}" ${p.avatar === img.file ? 'selected' : ''}>${img.name}</option>`).join('');
                let isCustom = p.avatar.startsWith('data:');
                optionsHtml += `<option value="custom" ${isCustom ? 'selected' : ''}>Своя...</option>`;

                container.innerHTML += `
                    <div class="editor-row">
                        <div style="display:flex; flex-direction:column; gap:2px; margin-right: 2px;">
                            <button type="button" class="btn-icon" onclick="moveParticipant(${p.id}, -1)">▲</button>
                            <button type="button" class="btn-icon" onclick="moveParticipant(${p.id}, 1)">▼</button>
                        </div>
                        <select onchange="handleAvatarSelect(event, ${p.id})">${optionsHtml}</select>
                        <input type="file" id="file-${p.id}" style="display:none" accept="image/*" onchange="handleCustomAvatar(event, ${p.id})">
                        <input type="text" placeholder="Имя" value="${p.name}" oninput="updateParticipant(${p.id}, 'name', this.value)">
                        <input type="text" placeholder="Заметка" value="${p.note}" oninput="updateParticipant(${p.id}, 'note', this.value)">
                        <input type="number" placeholder="Балл" value="${p.score}" oninput="updateParticipant(${p.id}, 'score', this.value)">
                        <button type="button" class="btn-remove" onclick="removeParticipant(${p.id})" title="Удалить">×</button>
                    </div>
                `;
            });
        }

        function handleAvatarSelect(e, id) {
            if (e.target.value === 'custom') document.getElementById('file-' + id).click();
            else updateParticipant(id, 'avatar', e.target.value);
        }
        function handleCustomAvatar(e, id) {
            const file = e.target.files[0];
            if (file) { const r = new FileReader(); r.onload = ev => { updateParticipant(id, 'avatar', ev.target.result); renderEditor(); }; r.readAsDataURL(file); }
        }
        function handleBgUpload(e) {
            const file = e.target.files[0];
            if(file) { const r = new FileReader(); r.onload = ev => { state.bgCustomData = ev.target.result; updatePreview(); }; r.readAsDataURL(file); }
        }

        function addParticipant() {
            const newId = state.participants.length > 0 ? Math.max(...state.participants.map(p => p.id)) + 1 : 1;
            state.participants.push({ id: newId, name: "Новый", score: 0, note: "", avatar: "default.jpg" });
            renderEditor(); updatePreview();
        }
        function removeParticipant(id) { state.participants = state.participants.filter(p => p.id !== id); renderEditor(); updatePreview(); }
        
        function randomizeParticipants() {
            for (let i = state.participants.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [state.participants[i], state.participants[j]] = [state.participants[j], state.participants[i]];
            }
            renderEditor(); updatePreview();
        }

        function updatePreview() {
            document.getElementById('renderTitle').innerText = state.title;
            document.getElementById('renderSubtitle').innerText = state.subtitle;

            const capture = document.getElementById('scoreboard-capture');
            const inner = document.getElementById('captureInner');
            
            // Разрешение
            if (state.aspectRatio === 'custom') {
                capture.style.aspectRatio = `${state.customW}/${state.customH}`;
                capture.style.maxWidth = `${state.customW}px`;
            } else {
                capture.style.aspectRatio = state.aspectRatio;
                capture.style.maxWidth = '1200px';
                if(state.aspectRatio === '1/1' || state.aspectRatio === '4/3') capture.style.maxWidth = '900px';
            }

            capture.className = `style-${state.style}`;
            
            // Цвета
            capture.style.setProperty('--bar-color', hexToRgba(state.barColor, state.barAlpha));
            capture.style.setProperty('--avatar-radius', state.avatarShape);
            
            if (state.highlightTop3) {
                capture.style.setProperty('--c-p1', state.c1); capture.style.setProperty('--c-p1-bg', hexToRgba(state.c1, 0.25));
                capture.style.setProperty('--c-p2', state.c2); capture.style.setProperty('--c-p2-bg', hexToRgba(state.c2, 0.15));
                capture.style.setProperty('--c-p3', state.c3); capture.style.setProperty('--c-p3-bg', hexToRgba(state.c3, 0.15));
            } else {
                capture.style.setProperty('--c-p1', 'rgba(255,255,255,0.1)'); capture.style.setProperty('--c-p1-bg', 'transparent');
                capture.style.setProperty('--c-p2', 'rgba(255,255,255,0.1)'); capture.style.setProperty('--c-p2-bg', 'transparent');
                capture.style.setProperty('--c-p3', 'rgba(255,255,255,0.1)'); capture.style.setProperty('--c-p3-bg', 'transparent');
            }

            // Отступы
            inner.style.setProperty('--pad-x', state.padX + 'px');
            inner.style.setProperty('--pad-y', state.padY + 'px');

            // Фон
            let bgUrl = "";
            if (state.bgType === 'custom') bgUrl = state.bgCustomData;
            else if (state.bgType !== 'none') bgUrl = state.bgType;

            const bgBlur = document.getElementById('bgBlur');
            const bgClear = document.getElementById('bgClear');
            if (bgUrl) {
                bgBlur.style.backgroundImage = `url('${bgUrl}')`;
                bgClear.style.backgroundImage = `url('${bgUrl}')`;
            } else {
                bgBlur.style.backgroundImage = 'none'; bgClear.style.backgroundImage = 'none';
            }

            // Генерация таблицы
            const board = document.getElementById('renderBoard');
            board.innerHTML = '';
            board.style.gridTemplateColumns = `repeat(${state.columns}, 1fr)`;

            let list = [...state.participants];
            if (state.viewMode === 'results') list.sort((a,b) => b.score - a.score);

            let maxScore = Math.max(...list.map(p => p.score), 1);

            list.forEach((p, index) => {
                let position = index + 1;
                let rowClass = "result-row";
                if (state.viewMode === 'results' && position <= 3) rowClass += ` place-${position}`;

                let fillPercent = (p.score / maxScore) * 100;
                let scoreBlock = '';
                if (state.viewMode === 'results') {
                    scoreBlock = `
                        <div class="score">
                            <div class="score-number">${p.score}</div>
                            <div class="score-label">Баллов</div>
                            <div class="score-bar"><div class="score-bar-fill" style="width: ${fillPercent}%"></div></div>
                        </div>`;
                }

                board.innerHTML += `
                    <div class="${rowClass}">
                        <div class="position">${position}</div>
                        <img src="${p.avatar}" class="participant-avatar" alt="av">
                        <div class="participant-info">
                            <div class="participant-name">${p.name}</div>
                            ${state.showNotes && p.note ? `<div class="participant-note">${p.note}</div>` : ''}
                        </div>
                        ${scoreBlock}
                    </div>`;
            });
        }

        function downloadImage() {
            const target = document.getElementById('scoreboard-capture');
            const btn = document.querySelector('.btn-download');
            btn.innerText = "Генерация..."; btn.style.opacity = '0.7';

            // Если размер огромный (кастомный), ставим scale 1 чтобы не зависло, иначе scale 2 для ретины
            let useScale = (state.aspectRatio === 'custom' && (state.customW > 2000 || state.customH > 2000)) ? 1 : 2;

            html2canvas(target, { scale: useScale, backgroundColor: null, useCORS: true, logging: false }).then(canvas => {
                const link = document.createElement('a');
                link.download = `${state.title}_${state.viewMode}.png`;
                link.href = canvas.toDataURL('image/png'); link.click();
                btn.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> Сохранить картинку`; btn.style.opacity = '1';
            }).catch(err => {
                alert("Ошибка! " + err);
                btn.innerHTML = `Сохранить картинку`; btn.style.opacity = '1';
            });
        }

        init();
    </script>
</body>
</html>
