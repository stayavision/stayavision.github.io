<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стаявидение — Официальный сайт</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #FFD700;
            --silver: #C0C0C0;
            --bronze: #CD7F32;
            --bg-dark: #0a0a1a;
            --bg-card: #12122a;
            --accent1: #7B2FBE;
            --accent2: #E91E8C;
            --accent3: #00D4FF;
            --text-primary: #ffffff;
            --text-secondary: #b0b0cc;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow-x: hidden;
            transition: all 0.3s ease;
        }

        /* Динамический фон для конкурсов */
        .dynamic-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            z-index: -2;
            opacity: 0.3;
            filter: blur(8px);
            transition: opacity 0.4s ease-in-out;
        }
        
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 26, 0.75); /* Затемнение, чтобы текст читался */
            z-index: -1;
            pointer-events: none;
        }

        /* Animated background orbs */
        .bg-animation {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; overflow: hidden; pointer-events: none;
        }

        .bg-animation .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.2; animation: floatOrb 20s infinite ease-in-out; }
        .bg-animation .orb:nth-child(1) { width: 600px; height: 600px; background: var(--accent1); top: -200px; left: -200px; animation-delay: 0s; }
        .bg-animation .orb:nth-child(2) { width: 500px; height: 500px; background: var(--accent2); top: 50%; right: -200px; animation-delay: -7s; }
        .bg-animation .orb:nth-child(3) { width: 400px; height: 400px; background: var(--accent3); bottom: -150px; left: 30%; animation-delay: -14s; }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(100px, 50px) scale(1.1); }
            50% { transform: translate(-50px, 100px) scale(0.9); }
            75% { transform: translate(80px, -60px) scale(1.05); }
        }

        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .particle { position: absolute; background: rgba(255, 255, 255, 0.5); border-radius: 50%; animation: sparkle linear infinite; }

        @keyframes sparkle {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* Header */
        header { position: relative; z-index: 10; text-align: center; padding: 80px 20px 40px; background: linear-gradient(180deg, rgba(123, 47, 190, 0.4) 0%, transparent 100%); }
        
        .logo-icon { width: 120px; height: 120px; margin: 0 auto 20px; position: relative; animation: logoPulse 3s infinite ease-in-out; }
        @keyframes logoPulse { 0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(233, 30, 140, 0.5)); } 50% { transform: scale(1.05); filter: drop-shadow(0 0 40px rgba(233, 30, 140, 0.8)); } }

        h1.main-title {
            font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 8vw, 6rem); font-weight: 900;
            background: linear-gradient(135deg, var(--gold), var(--accent2), var(--accent3), var(--accent1));
            background-size: 300% 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: gradientShift 4s ease-in-out infinite; letter-spacing: 2px; text-transform: uppercase; line-height: 1.1;
        }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .subtitle { font-size: 1.2rem; color: var(--text-secondary); margin-top: 15px; letter-spacing: 5px; text-transform: uppercase; }

        .header-actions { margin-top: 30px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .tg-btn {
            display: inline-flex; align-items: center; gap: 10px; background: linear-gradient(135deg, #0088cc, #00D4FF);
            color: white; padding: 12px 25px; border-radius: 30px; text-decoration: none; font-weight: 700; font-size: 0.95rem;
            box-shadow: 0 10px 30px rgba(0, 136, 204, 0.4); transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px;
        }
        .tg-btn:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 15px 40px rgba(0, 136, 204, 0.6); }

        /* Navigation */
        nav { position: sticky; top: 0; z-index: 100; background: rgba(10, 10, 26, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding: 0 20px; }
        .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: center; gap: 5px; padding: 15px 0; flex-wrap: wrap; }
        .nav-btn {
            padding: 10px 18px; border: none; background: transparent; color: var(--text-secondary);
            font-family: 'Montserrat', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer;
            border-radius: 25px; transition: all 0.3s ease; white-space: nowrap;
        }
        .nav-btn:hover, .nav-btn.active { background: linear-gradient(135deg, var(--accent1), var(--accent2)); color: white; transform: translateY(-2px); box-shadow: 0 5px 20px rgba(233, 30, 140, 0.3); }

        /* Main content */
        main { position: relative; z-index: 10; max-width: 1000px; margin: 0 auto; padding: 40px 20px 100px; }

        .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 50px; }
        .stat-card { background: linear-gradient(135deg, rgba(123, 47, 190, 0.3), rgba(233, 30, 140, 0.15)); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 25px 15px; text-align: center; transition: transform 0.3s; backdrop-filter: blur(10px); }
        .stat-number { font-size: 2.5rem; font-weight: 900; background: linear-gradient(135deg, var(--gold), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-label { font-size: 0.75rem; color: var(--text-secondary); margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }

        .edition-section { display: none; animation: fadeInUp 0.6s ease; }
        .edition-section.active { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .edition-header { text-align: center; margin-bottom: 40px; }
        .edition-number { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--accent2); text-transform: uppercase; letter-spacing: 5px; margin-bottom: 10px; }
        .edition-title { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 900; margin-bottom: 10px; text-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        .badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-top: 10px; }
        .badge-lost { background: rgba(255, 100, 100, 0.2); border: 1px solid #ff6464; color: #ff6464; }
        .badge-pending { background: rgba(0, 212, 255, 0.2); border: 1px solid var(--accent3); color: var(--accent3); }

        /* Media Links per Edition */
        .edition-links { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .watch-btn {
            display: inline-flex; align-items: center; gap: 8px; background: rgba(255,0,0,0.2); border: 1px solid rgba(255,0,0,0.5);
            color: #ff4d4d; padding: 10px 20px; border-radius: 12px; text-decoration: none; font-weight: 700; font-size: 0.9rem; transition: all 0.3s; backdrop-filter: blur(5px);
        }
        .watch-btn:hover { background: #ff4d4d; color: white; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,0,0,0.3); }
        .watch-btn svg { width: 20px; height: 20px; fill: currentColor; }

        /* Stage Toggles */
        .stage-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 30px; width: max-content; margin-left: auto; margin-right: auto; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .stage-tab { padding: 10px 25px; border: none; background: transparent; color: var(--text-secondary); border-radius: 25px; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: all 0.3s; }
        .stage-tab.active { background: rgba(255,255,255,0.15); color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        .stage-content { display: none; animation: fadeIn 0.4s ease; }
        .stage-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Results table */
        .results-container { background: rgba(18, 18, 42, 0.85); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); backdrop-filter: blur(15px); }
        .results-container.transparent { opacity: 0.8; }
        
        .result-row { display: flex; align-items: center; padding: 20px 30px; transition: all 0.3s ease; border-bottom: 1px solid rgba(255, 255, 255, 0.05); position: relative; }
        .result-row:hover { background: rgba(255, 255, 255, 0.05); }
        .result-row.place-1 { background: linear-gradient(90deg, rgba(255, 215, 0, 0.15), transparent); }
        .result-row.place-2 { background: linear-gradient(90deg, rgba(192, 192, 192, 0.1), transparent); }
        .result-row.place-3 { background: linear-gradient(90deg, rgba(205, 127, 50, 0.1), transparent); }
        .result-row.eliminated { opacity: 0.7; background: rgba(255,0,0,0.05); border-left: 3px solid #ff4d4d; }

        .position { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.2rem; margin-right: 20px; flex-shrink: 0; }
        .position-1 { background: linear-gradient(135deg, #FFD700, #FFA500); color: #1a1a1a; box-shadow: 0 0 25px rgba(255, 215, 0, 0.4); animation: winnerGlow 2s infinite ease-in-out; }
        .position-2 { background: linear-gradient(135deg, #E8E8E8, #A0A0A0); color: #1a1a1a; box-shadow: 0 0 15px rgba(192, 192, 192, 0.3); }
        .position-3 { background: linear-gradient(135deg, #CD7F32, #8B5A2B); color: white; box-shadow: 0 0 15px rgba(205, 127, 50, 0.3); }
        .position-other { background: rgba(255, 255, 255, 0.1); color: var(--text-secondary); }

        @keyframes winnerGlow { 0%, 100% { box-shadow: 0 0 25px rgba(255, 215, 0, 0.4); } 50% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.7); } }

        .participant-avatar { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; margin-right: 20px; border: 2px solid rgba(255, 255, 255, 0.1); flex-shrink: 0; background: #2a2a4a; }
        .place-1 .participant-avatar { border-color: var(--gold); box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }

        .participant-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .participant-name { font-size: 1.3rem; font-weight: 700; margin-bottom: 2px; }
        .place-1 .participant-name { color: var(--gold); }
        .participant-flag { font-size: 0.85rem; color: var(--text-secondary); font-weight: 600; }

        .score { text-align: right; margin-left: 15px; flex-shrink: 0; }
        .score-number { font-size: 2rem; font-weight: 900; line-height: 1; }
        .place-1 .score-number { background: linear-gradient(135deg, var(--gold), #FFA500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .score-label { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
        .score-bar { width: 120px; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; margin-top: 8px; overflow: hidden; margin-left: auto; }
        .score-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent1), var(--accent2)); transition: width 1s ease; }
        .place-1 .score-bar-fill { background: linear-gradient(90deg, var(--gold), #FFA500); }

        /* Winner showcase */
        .winner-showcase { text-align: center; padding: 20px; margin-bottom: 20px; }
        .winner-crown { font-size: 3rem; margin-bottom: 10px; animation: crownBounce 2s infinite ease-in-out; text-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        @keyframes crownBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .winner-name-big { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3rem); font-weight: 900; background: linear-gradient(135deg, var(--gold), #FFA500, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }
        .winner-label { color: var(--text-secondary); font-size: 0.85rem; letter-spacing: 3px; text-transform: uppercase; margin-top: 5px; }

        /* Notices */
        .notice-box { border-radius: 12px; padding: 20px 25px; display: flex; align-items: center; gap: 15px; margin: 20px 0; backdrop-filter: blur(10px); }
        .notice-lost { background: rgba(255, 100, 100, 0.15); border: 1px solid rgba(255, 100, 100, 0.3); color: #ff9999; }
        .notice-pending { background: rgba(0, 212, 255, 0.15); border: 1px solid rgba(0, 212, 255, 0.3); color: var(--accent3); }
        .notice-icon { font-size: 1.5rem; flex-shrink: 0; }
        .notice-text { font-size: 0.95rem; line-height: 1.5; }

        /* Overview Grids */
        .all-editions-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .edition-mini-card { background: rgba(18, 18, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 25px; cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden; backdrop-filter: blur(10px); }
        .edition-mini-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent3)); }
        .edition-mini-card:hover { transform: translateY(-5px); border-color: rgba(233, 30, 140, 0.5); box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5); }
        .mini-card-number { font-size: 0.75rem; color: var(--accent2); letter-spacing: 3px; text-transform: uppercase; font-weight: 700; }
        .mini-card-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; margin: 8px 0 15px; }
        .mini-card-winner { display: flex; align-items: center; gap: 10px; }
        .mini-card-winner-name { font-weight: 700; color: var(--gold); }

        /* Hall of Fame */
        .hall-of-fame { margin-top: 60px; }
        .hall-title { text-align: center; font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 10px; background: linear-gradient(135deg, var(--gold), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hall-subtitle { text-align: center; color: var(--text-secondary); margin-bottom: 40px; letter-spacing: 3px; text-transform: uppercase; font-size: 0.8rem; }
        .hall-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; }
        .hall-card { background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(233, 30, 140, 0.1)); border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 16px; padding: 30px 20px; text-align: center; transition: all 0.3s; backdrop-filter: blur(10px); }
        .hall-card:hover { transform: scale(1.05); border-color: rgba(255, 215, 0, 0.5); box-shadow: 0 0 30px rgba(255, 215, 0, 0.2); }
        .hall-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin: 0 auto 15px; border: 3px solid var(--gold); box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }
        .hall-card-name { font-size: 1.3rem; font-weight: 800; color: var(--gold); margin-bottom: 5px; }
        .hall-card-wins { font-size: 0.8rem; color: var(--text-secondary); letter-spacing: 1px; text-transform: uppercase; }

        .confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; overflow: hidden; }
        .confetti-piece { position: absolute; width: 10px; height: 10px; top: -10px; animation: confettiFall linear forwards; }
        @keyframes confettiFall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

        /* Умная Мобильная Адаптация */
        body.mobile-mode .result-row { padding: 15px; flex-wrap: wrap; }
        body.mobile-mode .position { width: 40px; height: 40px; font-size: 1rem; margin-right: 15px; }
        body.mobile-mode .participant-avatar { width: 50px; height: 50px; margin-right: 15px; }
        body.mobile-mode .participant-info { min-width: 150px; margin-bottom: 10px; }
        body.mobile-mode .score { margin-left: 0; text-align: left; flex-basis: 100%; display: flex; align-items: center; gap: 15px; justify-content: flex-end; }
        body.mobile-mode .score-bar { width: 100px; margin-top: 0; }
        body.mobile-mode .nav-btn { padding: 8px 12px; font-size: 0.75rem; }
        body.mobile-mode .stat-card { padding: 15px 10px; }
        body.mobile-mode .stage-tabs { width: 100%; flex-wrap: wrap; border-radius: 15px; }
        body.mobile-mode .stage-tab { flex: 1; text-align: center; padding: 10px; }

        footer { text-align: center; padding: 40px 20px; border-top: 1px solid rgba(255, 255, 255, 0.05); color: var(--text-secondary); font-size: 0.8rem; z-index: 10; position: relative; }
        footer span { background: linear-gradient(135deg, var(--accent1), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
        
        .scroll-top { position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, var(--accent1), var(--accent2)); border: none; color: white; font-size: 1.5rem; cursor: pointer; z-index: 100; opacity: 0; transition: all 0.3s; box-shadow: 0 5px 20px rgba(233, 30, 140, 0.4); }
        .scroll-top.visible { opacity: 1; }
        .scroll-top:hover { transform: translateY(-3px) scale(1.1); }
    </style>
</head>

                    links: {},
                    participants: [
                        { name: "Участник 1", avatar: "default.jpg", note: "Заявка принята" },
                        { name: "Участник 2", avatar: "default.jpg", note: "Заявка принята" },

            hallOfFame: [
                { name: "Гира", avatar: "gira.jpg", wins: "2 победы (SV1, SV4)" },
                { name: "Ритикс", avatar: "ritix.jpg", wins: "1 победа (SV2)" },
                { name: "Егорь", avatar: "egor.jpg", wins: "2 победы (SV3, SV5)" },

            ]
        };

        function init() {
            renderNavigation();
            renderAllSections();
            setupWindowResizeOptimizer();
            showSection('overview');
        }

        function renderNavigation() {
            let html = `<button class="nav-btn" onclick="showSection('overview')">Обзор</button>`;
            DATA.editions.forEach(ed => {
                html += `<button class="nav-btn" onclick="showSection('${ed.id}')">${ed.shortName}</button>`;
            });
            navContainer.innerHTML = html;
        }

        function renderAllSections() {
            let html = renderOverviewSection();
            DATA.editions.forEach(ed => html += renderEditionHTML(ed));
            appContainer.innerHTML = html;
        }

        function renderOverviewSection() {
            let totalEditions = DATA.editions.length;
            let finishedEditions = DATA.editions.filter(e => e.started).length;
            let totalWinners = DATA.hallOfFame.length;

            let html = `
                <section class="edition-section active" id="overview">
                    <div class="stats-bar">
                        <div class="stat-card"><div class="stat-number">${totalEditions}</div><div class="stat-label">Конкурсов</div></div>
                        <div class="stat-card"><div class="stat-number">${finishedEditions}</div><div class="stat-label">Проведено</div></div>
                        <div class="stat-card"><div class="stat-number">${totalWinners}</div><div class="stat-label">Победителей</div></div>
                        <div class="stat-card"><div class="stat-number">2026</div><div class="stat-label">Год</div></div>
                    </div>
                    <div class="edition-header"><div class="edition-number">Все конкурсы</div><h2 class="edition-title">История Стаявидения</h2></div>
                    <div class="all-editions-grid">
            `;

            DATA.editions.forEach(ed => {
                let badge = "";
                if (!ed.started) badge = `<span class="badge badge-pending">Не началось</span>`;
                else if (ed.isLost) badge = `<span class="badge badge-lost">Потеряно</span>`;

                let winnerIcon = ed.winner ? '👑' : '⏳';
                let winnerName = ed.winner ? ed.winner.name : 'Скоро';

                html += `
                    <div class="edition-mini-card" onclick="showSection('${ed.id}')">
                        <div class="mini-card-number">📍 ${ed.location}</div>
                        <div class="mini-card-title">${ed.name}</div>
                        <div class="mini-card-winner">
                            <span style="font-size: 1.2rem;">${winnerIcon}</span>
                            <span class="mini-card-winner-name" style="${!ed.winner ? 'color: var(--text-secondary);' : ''}">${winnerName}</span>
                            ${badge ? `<div style="margin-left: auto;">${badge}</div>` : ''}
                        </div>
                    </div>
                `;
            });

            html += `</div>
                <div class="hall-of-fame">
                    <h2 class="hall-title">Зал Славы</h2>
                    <p class="hall-subtitle">Все победители Стаявидения</p>
                    <div class="hall-grid">
            `;

            DATA.hallOfFame.forEach(h => {
                html += `
                    <div class="hall-card">
                        <img src="${h.avatar}" alt="${h.name}" class="hall-avatar">
                        <div class="hall-card-name">${h.name}</div>
                        <div class="hall-card-wins">${h.wins}</div>
                    </div>
                `;
            });

            html += `</div></div></section>`;
            return html;
        }

        function renderEditionHTML(ed) {
            let html = `
                <section class="edition-section" id="${ed.id}">
                    <div class="edition-header">
                        <div class="edition-number">📍 ${ed.location}</div>
                        <h2 class="edition-title">${ed.name}</h2>
                    </div>
            `;

            if (ed.winner) {
                html += `
                    <div class="winner-showcase">
                        <div class="winner-crown">👑</div>
                        <div class="winner-name-big">${ed.winner.name}</div>
                        <div class="winner-label">Победитель</div>
                    </div>
                `;
            } else {
                html += `
                    <div class="winner-showcase">
                        <div class="winner-crown" style="animation:none;">⏳</div>
                        <div class="winner-name-big" style="background: none; color: var(--text-primary); -webkit-text-fill-color: unset;">Ожидание</div>
                        <div class="winner-label">Победитель неизвестен</div>
                    </div>
                `;
            }

            if (ed.links && (ed.links.final || ed.links.semifinal)) {
                html += `<div class="edition-links">`;
                if (ed.links.semifinal) html += `<a href="${ed.links.semifinal}" target="_blank" class="watch-btn"><svg viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg> Смотреть Полуфинал</a>`;
                if (ed.links.final) html += `<a href="${ed.links.final}" target="_blank" class="watch-btn"><svg viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg> Смотреть Финал</a>`;
                html += `</div>`;
            }

            if (ed.isLost) {
                html += `
                    <div class="notice-box notice-lost">
                        <div class="notice-icon">⚠️</div>
                        <div class="notice-text">Полные результаты и видео частично утеряны. Известно только имя победителя — <strong>${ed.winner.name}</strong>.</div>
                    </div>
                `;
            } else if (!ed.started) {
                html += `
                    <div class="notice-box notice-pending">
                        <div class="notice-icon">🗓️</div>
                        <div class="notice-text">Конкурс <strong>ещё не начался</strong>. Заходите позже — здесь появятся баллы и результаты!</div>
                    </div>
                `;
            }

            if (!ed.started && ed.participants) {
                html += `<div class="results-container transparent">`;
                ed.participants.forEach(p => html += renderParticipantRow(p, null, true));
                html += `</div>`;
            } else if (ed.started) {
                if (ed.final && ed.semifinal) {
                    html += `
                        <div class="stage-tabs">
                            <button class="stage-tab active" onclick="switchStage('${ed.id}', 'final')">Финал</button>
                            <button class="stage-tab" onclick="switchStage('${ed.id}', 'semifinal')">Полуфинал</button>
                        </div>
                    `;
                    html += `<div id="${ed.id}-final" class="stage-content active"><div class="results-container">`;
                    let maxScore = Math.max(...ed.final.map(p => p.score || 1));
                    ed.final.forEach((p, index) => html += renderParticipantRow(p, index + 1, false, maxScore));
                    html += `</div></div>`;

                    html += `<div id="${ed.id}-semifinal" class="stage-content"><div class="results-container">`;
                    let maxScoreSemi = Math.max(...ed.semifinal.map(p => p.score || 1));
                    ed.semifinal.forEach((p, index) => html += renderParticipantRow(p, index + 1, false, maxScoreSemi));
                    html += `</div></div>`;
                } else if (ed.final) {
                    html += `<div class="results-container">`;
                    let maxScore = Math.max(...ed.final.map(p => p.score || 1));
                    ed.final.forEach((p, index) => html += renderParticipantRow(p, index + 1, false, maxScore));
                    html += `</div>`;
                }
            }

            html += `</section>`;
            return html;
        }

        function renderParticipantRow(p, position, isPending = false, maxScore = 10) {
            let classes = "result-row";
            if (position === 1 && !isPending) classes += " place-1";
            else if (position === 2 && !isPending) classes += " place-2";
            else if (position === 3 && !isPending) classes += " place-3";
            
            if (p.eliminated) classes += " eliminated";

            let posHTML = isPending ? `<div class="position position-other">-</div>` : 
                `<div class="position ${position <= 3 ? 'position-'+position : 'position-other'}">${position}</div>`;
            
            let fillPercent = p.score ? (p.score / maxScore * 100) : 0;
            
            let scoreHTML = isPending ? `
                <div class="score">
                    <div class="score-number">0</div>
                    <div class="score-label">Баллов</div>
                    <div class="score-bar"><div class="score-bar-fill" style="width: 0%"></div></div>
                </div>
            ` : `
                <div class="score">
                    <div class="score-number">${p.score !== null ? p.score : '—'}</div>
                    <div class="score-label">${p.score !== null ? 'Баллов' : 'Н/Д'}</div>
                    ${p.score !== null ? `<div class="score-bar"><div class="score-bar-fill" style="width: ${fillPercent}%"></div></div>` : ''}
                </div>
            `;

            return `
                <div class="${classes}">
                    ${posHTML}
                    <img src="${p.avatar}" alt="${p.name}" class="participant-avatar">
                    <div class="participant-info">
                        <div class="participant-name">${p.name}</div>
                        <div class="participant-flag" style="${p.eliminated ? 'color: #ff6464;' : ''}">${p.note || ''}</div>
                    </div>
                    ${scoreHTML}
                </div>
            `;
        }

        window.switchStage = function(editionId, stage) {
            let section = document.getElementById(editionId);
            section.querySelectorAll('.stage-tab').forEach(t => t.classList.remove('active'));
            section.querySelectorAll('.stage-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`${editionId}-${stage}`).classList.add('active');
        };

        window.showSection = function(sectionId) {
            document.querySelectorAll('.edition-section').forEach(s => s.classList.remove('active'));
            let target = document.getElementById(sectionId);
            if(target) target.classList.add('active');

            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            let buttons = document.querySelectorAll('.nav-btn');
            for(let b of buttons) {
                if(b.getAttribute('onclick').includes(sectionId)) { b.classList.add('active'); break; }
            }

            // ДИНАМИЧЕСКИЙ ФОН
            const bgEl = document.getElementById('dynamicBg');
            bgEl.style.opacity = '0'; // Плавно гасим текущий
            
            setTimeout(() => {
                let bgUrl = 'wolfs.jpg';
                if (sectionId === 'edition6') bgUrl = 'sv6.webp';
                if (sectionId === 'edition7') bgUrl = 'sv7.webp';
                
                bgEl.style.backgroundImage = `url('${bgUrl}')`;
                bgEl.style.opacity = '0.4'; // Плавно зажигаем новый
            }, 300);

            window.scrollTo({ top: document.querySelector('nav').offsetTop - 20, behavior: 'smooth' });

            let edData = DATA.editions.find(e => e.id === sectionId);
            if (edData && edData.started && !edData.isLost) triggerConfetti();
        };

        function setupWindowResizeOptimizer() {
            const checkRes = () => { document.body.classList.toggle('mobile-mode', window.innerWidth <= 768); };
            window.addEventListener('resize', checkRes); checkRes(); 
        }

        function triggerConfetti() {
            const container = document.getElementById('confetti');
            container.innerHTML = '';
            const colors = ['#FFD700', '#E91E8C', '#7B2FBE', '#00D4FF'];
            for (let i = 0; i < 70; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + '%';
                piece.style.background = colors[Math.floor(Math.random() * colors.length)];
                piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
                piece.style.animationDelay = (Math.random() * 1) + 's';
                piece.style.width = (Math.random() * 8 + 5) + 'px';
                piece.style.height = piece.style.width;
                piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                container.appendChild(piece);
            }
            setTimeout(() => container.innerHTML = '', 4000);
        }

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 15 + 10) + 's';
                particle.style.animationDelay = (Math.random() * 15) + 's';
                particle.style.width = (Math.random() * 3 + 1) + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }

        window.addEventListener('scroll', () => {
            const btn = document.getElementById('scrollTop');
            if (window.scrollY > 300) btn.classList.add('visible'); else btn.classList.remove('visible');
        });

        createParticles();
        init();
    </script>
